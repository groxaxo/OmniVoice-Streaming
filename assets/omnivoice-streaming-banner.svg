<svg width="1600" height="420" viewBox="0 0 1600 420" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">OmniVoice Streaming</title>
  <desc id="desc">A maintained OmniVoice fork with production fixes, server upgrades, and stable TTS delivery.</desc>
  <defs>
